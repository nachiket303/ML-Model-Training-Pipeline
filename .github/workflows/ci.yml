name: CI

# Runs formatting, linting, and tests on every push and pull request. This is the working proof
# behind the "config-driven runs -> CI/CD" claim: the same checks a reviewer runs locally gate
# every change here. Pinned to Python 3.11, the project's target interpreter.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (pinned deps + editable package)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Format check (black)
        run: black --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest
